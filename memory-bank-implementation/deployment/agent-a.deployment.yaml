apiVersion: apps/v1
kind: Deployment
metadata:
  name: adk-agent-a
  namespace: namespace-a
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adk-agent-a
  template:
    metadata:
      labels:
        app: adk-agent-a
    spec:
      serviceAccountName: agent-ksa-a
      containers:
      - name: agent-container
        image: "us-central1-docker.pkg.dev/GCP_PROJECT_ID/agent-repository/native-adk-agents:latest" 
        imagePullPolicy: Always
        args: ["A"] # Evaluates Agent A (Python Only)
        env:
        - name: GCP_PROJECT
          value: "GCP_PROJECT_ID"
        - name: GCP_REGION
          value: "us-central1"
        - name: MEMORY_BANK_PATH
          value: "projects/GCP_PROJECT_NUMBER/locations/us-central1/reasoningEngines/REASONING_ENGINE_ID_A"